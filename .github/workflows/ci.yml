name: TP4 CI

on:
  push:
    branches:
      - main
      - tp4-dev

jobs:
  build-and-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits au wrapper Maven
        run: chmod +x mvnw

      - name: Compiler et tester
        run: ./mvnw clean verify

      - name: Verifier SONAR_TOKEN
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN manquant"
            exit 1
          else
            echo "SONAR_TOKEN present"
          fi

      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Nirina2108_TP_4_auth_master_key
            -Dsonar.organization=nirina2108
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml