name: TP4 CI

on:
  push:
    branches:
      - main
      - tp4-dev
  pull_request:
    branches:
      - main

jobs:
  build-and-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits au mvnw
        run: chmod +x mvnw

      - name: Build + Tests
        run: ./mvnw clean verify

      - name: Verifier SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN manquant dans GitHub Actions"
            exit 1
          else
            echo "SONAR_TOKEN charge correctement"
          fi

      - name: Analyse SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=Nirina2108_TP_4_auth_master_key \
            -Dsonar.organization=nirina2108 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml