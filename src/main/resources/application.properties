spring.application.name=TP_4_auth_master_key

server.port=8000

spring.datasource.url=jdbc:mysql://localhost:3306/tp_auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Clé HMAC du TP3/TP4
app.security.smk=tp3-secret-smk-2026

# Master Key du TP4 injectée par variable d'environnement
app.security.master-key=${APP_MASTER_KEY:}